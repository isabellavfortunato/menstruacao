<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js';

     AJUSTES FIXOS

  };
  const VAPID = "BHhc_VMBozHWKoRVfF9nqwBvtSlrf_D6rmxD-LP0-4q7HyIM-yfd2dWrtPHvr-7fZ-nz1IY4GOiQh1D2OedGU6Y";

  const app = initializeApp(config);

    'humor':[
      'calma','feliz','energética','alegre','mudanças de humor','irritada','triste','ansiosa',
      'desanimada','culpada','pensamentos obsessivos','pouca energia','apática','confusa','muito autocrítica'
    ],
    'sintomas':[
      'está tudo bem','cólicas','seios sensíveis','dor de cabeça','acne','dor nas costas','dor nas pernas','fadiga',
      'ondas de calor','suores noturnos','confusão mental','dor nas articulações','ardência bucal',
      'desejos','insônia','dor abdominal','coceira vaginal','ressecamento vaginal','cabelo seco',
      'pele seca','olhos secos','queda de cabelo','incontinência'
    ],
    'digestão e fezes':['náusea','inchaço','prisão de ventre','diarreia','gases']
  };
  const GRUPO_HUMOR=new Set(SINTOMAS['humor']);
  const ESCALA={energia:['baixa','média','alta'], foco:['baixo','médio','alto']};

  let view=new Date(); view.setDate(1);
  let selecionado=null;
  let relAberto=false;

  const meses=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  const diasSem=['domingo','segunda','terça','quarta','quinta','sexta','sábado'];
  const iso=d=>{const y=d.getFullYear();const m=String(d.getMonth()+1).padStart(2,'0');const dia=String(d.getDate()).padStart(2,'0');return y+'-'+m+'-'+dia;};
  const deIso=s=>{const p=s.split('-').map(Number);return new Date(p[0],p[1]-1,p[2]);};
  const addDias=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x;};
  const hojeIso=()=>iso(new Date());
  const esc=t=>String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  async function salvar(){
    try{
      await setDoc(doc(db,'ciclo','principal'),{
        periods:estado.periods, duracaoCiclo:DURACAO_CICLO, duracaoMenstruacao:DURACAO_MENSTRUACAO,
        sintomas:estado.sintomas||{}, notas:estado.notas||{}, diario:estado.diario||{},
        importadoFlo:!!estado.importadoFlo, atualizadoEm:Date.now()
      });
    }catch(e){ console.error(e); }
  }

  function importarFlo(){
    const set=new Set(estado.periods||[]);
    for(const p of FLO_PERIODS) set.add(p);
    estado.periods=Array.from(set).sort();
    if(!estado.sintomas) estado.sintomas={};
    for(const data in FLO_SINTOMAS){
      const atual=estado.sintomas[data]||[];
      for(const s of FLO_SINTOMAS[data]) if(!atual.includes(s)) atual.push(s);
      estado.sintomas[data]=atual;
    }
    if(!estado.notas) estado.notas={};
    for(const data in FLO_NOTAS) if(!estado.notas[data]) estado.notas[data]=FLO_NOTAS[data];
    estado.importadoFlo=true;
  }

  function diasMenstruacao(){const s=new Set();for(const p of estado.periods){const ini=deIso(p);for(let i=0;i<estado.duracaoMenstruacao;i++)s.add(iso(addDias(ini,i)));}return s;}
  function previsao(){if(estado.periods.length===0)return null;const u=estado.periods.slice().sort()[estado.periods.length-1];const pred=addDias(deIso(u),estado.duracaoCiclo);return{pred:iso(pred),aviso5:iso(addDias(pred,-5)),aviso3:iso(addDias(pred,-3))};}

  function diaDoCiclo(dataStr){
    const st=estado.periods.slice().sort();const d=deIso(dataStr);let ult=null;
    for(const p of st){const dp=deIso(p);if(dp<=d) ult=dp; else break;}
    if(!ult) return null;
    return Math.round((d-ult)/86400000)+1;
  }
  function faseDoDia(dataStr){
    const n=diaDoCiclo(dataStr); if(n===null) return null;
    if(n<=estado.duracaoMenstruacao) return 'menstruação';
    const c=estado.duracaoCiclo;
    if(n<=Math.round(c*0.45)) return 'depois da menstruação';
    if(n<=Math.round(c*0.72)) return 'meio do ciclo';
    return 'antes da menstruação';
  }

    const el=document.getElementById('contador');
    if(estado.periods.length===0){el.innerHTML='<div class="rotulo">próxima menstruação</div><div class="numero">sem data</div><div class="sub">registre um primeiro dia para começar a contagem.</div>';return;}

    let n,s;
    if(diff>0){n='em '+diff+(diff===1?' dia':' dias');s='para a próxima menstruação, prevista para '+txt+'.';}
    else if(diff===0){n='é hoje';s='hoje é o dia previsto. registre quando começar.';}
    else{n=Math.abs(diff)+(diff===-1?' dia de atraso':' dias de atraso');s='a previsão era '+txt+'. registre o dia real quando começar.';}
    const dc=diaDoCiclo(hojeIso());
    if(dc) s+=' hoje é o dia '+dc+' do seu ciclo.';
    el.innerHTML='<div class="rotulo">próxima menstruação</div><div class="numero">'+n+'</div><div class="sub">'+s+'</div>';
  }

    const d=(estado.diario&&estado.diario[data])||{};
    let h='';
    for(const campo in ESCALA){
      h+='<div class="linhaEsc"><span class="et">'+campo+'</span><span class="opcoes">';
      for(const v of ESCALA[campo])
        h+='<button class="op'+(d[campo]===v?' on':'')+'" data-esc="'+campo+'" data-val="'+v+'" data-data="'+data+'">'+v+'</button>';
      h+='</span></div>';
    }
    return h;
  }

  async function marcarEscala(data, campo, val){
    if(!estado.diario) estado.diario={};
    const d=estado.diario[data]?Object.assign({},estado.diario[data]):{};
    if(d[campo]===val) delete d[campo]; else d[campo]=val;
    if(Object.keys(d).length) estado.diario[data]=d; else delete estado.diario[data];
    await salvar();
  }

    const st=estado.periods.slice().sort();const out=[];
    for(let i=1;i<st.length;i++){const n=Math.round((deIso(st[i])-deIso(st[i-1]))/86400000);if(n>=15&&n<=60) out.push(n);}
    return out;
  }

    const st=estado.periods.slice().sort();const d=deIso(dataStr);
    for(const p of st){const dp=deIso(p);if(dp>=d) return Math.round((dp-d)/86400000);}
    return null;
  }

    if(estado.periods.length<2) return '';
    const cont={};
    for(const data in (estado.sintomas||{})){
      const n=diasAteProxima(data); if(n===null||n>7) continue;
      for(const s of estado.sintomas[data]) cont[s]=(cont[s]||0)+1;
    }
    const top=Object.entries(cont).filter(e=>e[1]>=2).sort((a,b)=>b[1]-a[1]).slice(0,4).map(e=>e[0]);
    if(!top.length) return '';
    return 'na semana antes da menstruação você costuma registrar: '+top.join(', ')+'.';
  }

  function barras(cont){
    const ent=Object.entries(cont).sort((a,b)=>b[1]-a[1]).slice(0,8);
    if(!ent.length) return '<p class="nota">nada registrado ainda.</p>';
    const max=ent[0][1];let h='';
    for(const [nome,q] of ent)
      h+='<div class="barra"><span class="nome">'+esc(nome)+'</span><span class="trilho"><span class="fita" style="width:'+Math.round(q/max*100)+'%"></span></span><span class="qtd">'+q+'</span></div>';

  }

  function diasDoMes(ano,mes){
    const total=new Date(ano,mes+1,0).getDate();const out=[];
    for(let d=1;d<=total;d++){
      const k=iso(new Date(ano,mes,d));
      const sint=(estado.sintomas&&estado.sintomas[k])||[];
      const nota=(estado.notas&&estado.notas[k])||'';
      const di=(estado.diario&&estado.diario[k])||{};
      const ehIni=estado.periods.includes(k);
      if(sint.length||nota||di.energia||di.foco||ehIni) out.push({k,sint,nota,di,ehIni});
    }
    return out;
  }

  function textoResumo(ano,mes){
    const dias=diasDoMes(ano,mes);
    let t='resumo de '+meses[mes]+' de '+ano+'\n\n';
    if(!dias.length) return t+'nada registrado neste mês.\n';
    for(const x of dias){
      const d=deIso(x.k);const dc=diaDoCiclo(x.k);const fase=faseDoDia(x.k);
      t+=d.getDate()+' de '+meses[mes]+', '+diasSem[d.getDay()];
      if(dc) t+='  (dia '+dc+' do ciclo'+(fase?', '+fase:'')+')';
      t+='\n';
      if(x.ehIni) t+='  menstruação começou\n';
      if(x.di.energia||x.di.foco){
        const p=[]; if(x.di.energia) p.push('energia '+x.di.energia); if(x.di.foco) p.push('foco '+x.di.foco);
        t+='  '+p.join(', ')+'\n';
      }
      if(x.sint.length) t+='  '+x.sint.join(', ')+'\n';
      if(x.nota) t+='  "'+x.nota+'"\n';
      t+='\n';
    }
    return t;
  }

  function resumoHtml(ano,mes){
    const dias=diasDoMes(ano,mes);
    let h='<div class="bloco"><h4>o que você registrou em '+meses[mes]+'</h4>';
    if(!dias.length){ h+='<p class="nota">nada registrado neste mês. use as setas do calendário para ver outro mês.</p></div>'; return h; }
    for(const x of dias){
      const d=deIso(x.k);const dc=diaDoCiclo(x.k);const fase=faseDoDia(x.k);
      h+='<div class="diaResumo"><div class="cab">'+d.getDate()+' de '+meses[mes]+', '+diasSem[d.getDay()];
      if(dc) h+=' <span class="cic">dia '+dc+' do ciclo'+(fase?', '+fase:'')+'</span>';
      h+='</div>';
      if(x.ehIni) h+='<div class="it">menstruação começou</div>';
      if(x.di.energia||x.di.foco){
        const p=[]; if(x.di.energia) p.push('energia '+x.di.energia); if(x.di.foco) p.push('foco '+x.di.foco);
        h+='<div class="it">'+p.join(' · ')+'</div>';
      }
      if(x.sint.length) h+='<div class="it">'+esc(x.sint.join(', '))+'</div>';
      if(x.nota) h+='<div class="txt">'+esc(x.nota)+'</div>';
      h+='</div>';
    }
    h+='<button class="btCopiar" id="btCopiar">copiar este resumo</button>';
    h+='<p class="nota">este resumo só junta o que você escreveu, com a data e o dia do ciclo. as conclusões ficam com você.</p></div>';
    return h;
  }

  function montarRelatorio(){
    const el=document.getElementById('relatorio');
    const ano=view.getFullYear(), mes=view.getMonth();
    let h='<h3>resumo de '+meses[mes]+' de '+ano+'</h3>';
    h+=resumoHtml(ano,mes);

    const fases=['menstruação','depois da menstruação','meio do ciclo','antes da menstruação'];
    const acum={};for(const f of fases) acum[f]={energia:[],foco:[]};
    let totalDiario=0;
    for(const data in (estado.diario||{})){
      const f=faseDoDia(data); if(!f) continue;
      const d=estado.diario[data];totalDiario++;
      if(d.energia) acum[f].energia.push(ESCALA.energia.indexOf(d.energia)+1);
      if(d.foco) acum[f].foco.push(ESCALA.foco.indexOf(d.foco)+1);
    }
    h+='<div class="bloco"><h4>energia e foco ao longo do ciclo</h4>';
    if(totalDiario<40){
      h+='<p class="nota">você tem '+totalDiario+' dias com energia ou foco marcados. este bloco começa a mostrar a sua curva a partir de 40 dias, mais ou menos um mês e meio de marcação diária. até lá ele fica quieto para não sugerir um padrão que os dados ainda não sustentam.</p>';
    } else {
      for(const f of fases){
        const e=acum[f].energia, fo=acum[f].foco;
        const me=e.length?Math.round(e.reduce((s,x)=>s+x,0)/e.length*10)/10:null;
        const mf=fo.length?Math.round(fo.reduce((s,x)=>s+x,0)/fo.length*10)/10:null;
        h+='<p style="margin-bottom:5px"><strong style="font-weight:600">'+f+'</strong> <span style="color:var(--suave);font-size:12px">('+e.length+' dias)</span><br><span style="font-size:13px">energia '+(me!==null?me:'-')+' de 3 · foco '+(mf!==null?mf:'-')+' de 3</span></p>';
      }
      h+='<p class="nota">média das suas marcações, em que 1 é baixa e 3 é alta.</p>';
    }
    h+='</div>';

    const inter=intervalos();const ult=inter.slice(-12);
    h+='<div class="bloco"><h4>seu ciclo</h4>';
    if(inter.length){
      h+='<p>'+estado.periods.length+' menstruações registradas. nos últimos '+ult.length+' ciclos o intervalo foi de '+mediana(ult)+' dias na mediana, entre '+Math.min(...ult)+' e '+Math.max(...ult)+'.</p>';
      const med=mediana(ult);
      if(med && Math.abs(med-estado.duracaoCiclo)>=2)
        h+='<p class="nota">a previsão está contando de '+estado.duracaoCiclo+' em '+estado.duracaoCiclo+' dias e o seu histórico aponta '+med+'. isso desloca o aviso em cerca de '+Math.abs(med-estado.duracaoCiclo)+' dias. este número é um ajuste fixo no código, então peça a mudança quando quiser.</p>';
    } else h+='<p class="nota">ainda não há ciclos suficientes.</p>';
    h+='</div>';

    const contS={};
    for(const data in (estado.sintomas||{}))
      for(const s of estado.sintomas[data]) if(!GRUPO_HUMOR.has(s)) contS[s]=(contS[s]||0)+1;
    h+='<div class="bloco"><h4>sintomas mais registrados, no total</h4>'+barras(contS)+'</div>';

    const perto={};
    for(const data in (estado.sintomas||{})){
      const n=diasAteProxima(data); if(n===null||n>7) continue;
      for(const s of estado.sintomas[data]) perto[s]=(perto[s]||0)+1;
    }
    h+='<div class="bloco"><h4>na semana antes da menstruação</h4>'+barras(perto)+'</div>';

    el.innerHTML=h;
    const bt=document.getElementById('btCopiar');
    if(bt) bt.addEventListener('click',async()=>{
      try{ await navigator.clipboard.writeText(textoResumo(ano,mes)); bt.textContent='resumo copiado'; setTimeout(()=>bt.textContent='copiar este resumo',2000); }
      catch(e){ bt.textContent='não foi possível copiar'; }
    });
  }

  function chipsHtml(){
    const sel=(estado.sintomas&&estado.sintomas[selecionado])||[];
    let h='';
    for(const grupo in SINTOMAS){
      h+='<div class="grupo"><h4>'+grupo+'</h4><div class="chips">';
      for(const s of SINTOMAS[grupo]) h+='<button class="chip'+(sel.includes(s)?' on':'')+'" data-sintoma="'+s+'">'+s+'</button>';
      h+='</div></div>';
    }
    return h;
  }

  function painelHtml(){
    if(!selecionado) selecionado=hojeIso();
    const d=deIso(selecionado);
    const ehHoje=selecionado===hojeIso();
    const txt=(ehHoje?'hoje, ':'')+d.getDate()+' de '+meses[d.getMonth()]+', '+diasSem[d.getDay()];
    const dc=diaDoCiclo(selecionado);const fase=faseDoDia(selecionado);
    let h='<div class="cabDia"><span class="qual">'+txt+'</span>';
    if(dc) h+='<span class="cic">dia '+dc+' do ciclo'+(fase?', '+fase:'')+'</span>';
    h+='</div>';
    if(estado.periods.includes(selecionado)) h+='<button id="remover" class="acao remover">remover menstruação deste dia</button>';
    else h+='<button id="registrar" class="acao">registrar menstruação</button>';
    h+='<div class="secao"><div class="tituloSint">energia e foco</div>'+escalasHtml(selecionado)+'</div>';
    h+='<div class="secao"><div class="tituloSint">anotações</div>'
     + '<textarea id="campoNota" placeholder="escreva aqui o que aconteceu, como você se sentiu, o que quiser lembrar deste dia">'+esc((estado.notas&&estado.notas[selecionado])||'')+'</textarea>'
     + '<div class="estadoNota" id="estadoNota"></div></div>';
    h+='<div class="secao"><div class="tituloSint">sintomas do dia</div>'+chipsHtml()+'</div>';
    return h;
  }

  let tempoNota=null;
  function ligarNota(){
    const c=document.getElementById('campoNota'); if(!c) return;
    c.addEventListener('input',()=>{
      const est=document.getElementById('estadoNota');
      est.textContent='escrevendo...';
      clearTimeout(tempoNota);
      tempoNota=setTimeout(async()=>{
        if(!estado.notas) estado.notas={};
        const v=c.value.trim();
        if(v) estado.notas[selecionado]=v; else delete estado.notas[selecionado];
        await salvar();
        est.textContent='nota salva.';
        const cell=document.querySelector('.dia[data-k="'+selecionado+'"]');
        if(cell) cell.classList.toggle('temSintoma', !!(v||(estado.sintomas[selecionado]&&estado.sintomas[selecionado].length)||(estado.diario&&estado.diario[selecionado])));
        setTimeout(()=>{ if(est.textContent==='nota salva.') est.textContent=''; },2000);
      },800);
    });
  }

  function render(){
    const ano=view.getFullYear(),mes=view.getMonth();
    document.getElementById('mes').textContent=meses[mes]+' de '+ano;
    contador();
    const pe=document.getElementById('padroes');const p=padroes();pe.innerHTML=p;pe.style.display=p?'block':'none';
    if(relAberto) montarRelatorio();
    const offset=(new Date(ano,mes,1).getDay()+6)%7;const total=new Date(ano,mes+1,0).getDate();
    const m=diasMenstruacao();const prev=previsao();
    let html='';
    for(let i=0;i<offset;i++)html+='<div class="vazio"></div>';
    for(let d=1;d<=total;d++){
      const k=iso(new Date(ano,mes,d));const cls=['dia'];const ehMens=m.has(k);
      if(ehMens)cls.push('menstruacao');
      if(estado.periods.includes(k))cls.push('inicio');
      if(!ehMens&&prev){if(k===prev.pred)cls.push('previsao');else if(k===prev.aviso3)cls.push('aviso3');else if(k===prev.aviso5)cls.push('aviso5');}
      const temS=estado.sintomas&&estado.sintomas[k]&&estado.sintomas[k].length;
      const temN=estado.notas&&estado.notas[k];
      const temD=estado.diario&&estado.diario[k];
      if(temS||temN||temD)cls.push('temSintoma');
      if(k===hojeIso())cls.push('hoje');
      if(k===selecionado)cls.push('sel');
      html+='<button class="'+cls.join(' ')+'" data-k="'+k+'">'+d+'</button>';
    }
    document.getElementById('grade').innerHTML=html;
    document.getElementById('painel').innerHTML=painelHtml();
    ligarNota();
  }

  document.getElementById('anterior').onclick=()=>{view.setMonth(view.getMonth()-1);render();};
  document.getElementById('proximo').onclick=()=>{view.setMonth(view.getMonth()+1);render();};
  document.getElementById('grade').addEventListener('click',e=>{const b=e.target.closest('.dia');if(!b)return;selecionado=b.dataset.k;render();});

  document.getElementById('btnRel').addEventListener('click',()=>{
    relAberto=!relAberto;
    const el=document.getElementById('relatorio');
    document.getElementById('btnRel').classList.toggle('on',relAberto);
    if(relAberto){ montarRelatorio(); el.style.display='block'; el.scrollIntoView({behavior:'smooth',block:'nearest'}); }
    else el.style.display='none';
  });

  document.getElementById('painel').addEventListener('click',async e=>{
    const op=e.target.closest('.op');
    if(op){ await marcarEscala(op.dataset.data, op.dataset.esc, op.dataset.val); render(); return; }
    const chip=e.target.closest('.chip');
    if(chip){
      const s=chip.dataset.sintoma;
      if(!estado.sintomas) estado.sintomas={};
      const arr=estado.sintomas[selecionado]?estado.sintomas[selecionado].slice():[];
      const i=arr.indexOf(s);
      if(i>=0) arr.splice(i,1); else arr.push(s);
      if(arr.length) estado.sintomas[selecionado]=arr; else delete estado.sintomas[selecionado];
      chip.classList.toggle('on');
      const cell=document.querySelector('.dia[data-k="'+selecionado+'"]');
      if(cell) cell.classList.toggle('temSintoma', !!(arr.length||(estado.notas&&estado.notas[selecionado])||(estado.diario&&estado.diario[selecionado])));
      const pe=document.getElementById('padroes');const p=padroes();pe.innerHTML=p;pe.style.display=p?'block':'none';
      if(relAberto) montarRelatorio();
      await salvar();
      return;
    }
    if(e.target.id==='registrar'){if(!estado.periods.includes(selecionado)){estado.periods.push(selecionado);estado.periods.sort();}await salvar();render();}
    if(e.target.id==='remover'){estado.periods=estado.periods.filter(p=>p!==selecionado);await salvar();render();}
  });

  const btn=document.getElementById('btnAvisos');
  btn.addEventListener('click',async()=>{
    const est=document.getElementById('estadoAviso');
    try{
      est.textContent='preparando...';
      if(!('Notification' in window)){ est.textContent='este navegador não tem suporte a notificações.'; return; }
      const ok=await isSupported();
      if(!ok){ est.textContent='este navegador não suporta push. no iPhone, abra pelo ícone da tela inicial.'; return; }
      const permissao=await Notification.requestPermission();
      if(permissao!=='granted'){ est.textContent='permissão não concedida ('+permissao+').'; return; }
      if(!auth.currentUser){ await signInAnonymously(auth); }
      const registration=await navigator.serviceWorker.register('firebase-messaging-sw.js');
      await navigator.serviceWorker.ready;
      const messaging=getMessaging(app);
      const token=await getToken(messaging,{vapidKey:VAPID, serviceWorkerRegistration:registration});
      if(!token){ est.textContent='não foi possível gerar o token neste aparelho.'; return; }
      await setDoc(doc(db,'tokens',token),{token:token, criadoEm:Date.now()});
      btn.classList.add('ligado'); btn.textContent='avisos ligados';
      est.textContent='avisos ligados neste aparelho.';
    }catch(e){ console.error(e); est.textContent='erro: '+((e && (e.message||e.code)) || e); }
  });

  (async()=>{
    try{
      await signInAnonymously(auth);
      const snap=await getDoc(doc(db,'ciclo','principal'));
      if(snap.exists()){
        const d=snap.data();
        estado={
          periods:d.periods||[], duracaoMenstruacao:DURACAO_MENSTRUACAO, duracaoCiclo:DURACAO_CICLO,
          sintomas:d.sintomas||{}, notas:d.notas||{}, diario:d.diario||{}, importadoFlo:!!d.importadoFlo
        };
      }
      if(!estado.importadoFlo){ importarFlo(); }
      await salvar();
    }catch(e){console.error(e);}
    selecionado=hojeIso();
    render();
  })();
</script>
</body>
</html>
