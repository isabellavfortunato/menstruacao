name: lembretes

# O horário do cron é em UTC. Rio fica em UTC menos 3.
# 11:00 UTC corresponde a 08:00 em Brasília. O envio roda uma vez por dia
# e o próprio script decide se hoje é dia de aviso de 5, de 3 ou o dia previsto.

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  enviar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install firebase-admin
      - run: node "enviar lembretes.mjs"
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
